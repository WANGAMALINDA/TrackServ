<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace System</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}

nav {
    background: #34495e;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background: #3498db;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #2980b9;
}
</style>
</head>

<body>

<header>
    <h1>Trace</h1>
    <p>Missing Person & Lost Item Reporting System</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Report</a>
    <a href="#">View Cases</a>
    <a href="#">Login</a>
</nav>

<div class="container">

    <div class="card">
        <h2>Report Missing Person / Lost Item</h2>

        <form>
            <label>Type:</label>
            <select>
                <option>Missing Person</option>
                <option>Lost Item</option>
            </select>

            <label>Name / Item:</label>
            <input type="text" placeholder="Enter name or item">

            <label>Description:</label>
            <textarea placeholder="Describe the situation"></textarea>

            <label>Location:</label>
            <input type="text" placeholder="Enter location">

            <label>Upload Image:</label>
            <input type="file">

            <button type="submit">Submit Report</button>
        </form>
    </div>

    <div class="card">
        <h2>Recent Cases</h2>

        <p><strong>Missing:</strong> John Doe - Last seen in Johannesburg</p>
        <p><strong>Lost Item:</strong> Black Wallet - Mall area</p>

    </div>

</div>

</body>
</html>
